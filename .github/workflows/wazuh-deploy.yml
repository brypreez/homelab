name: Deploy Wazuh Rules
on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Sync Rules to Wazuh
        run: |
          # Find the file in the workspace
          FILE_PATH=$(find . -name local_rules.xml | head -n 1)
          echo "Syncing file from: $FILE_PATH"
          
          # Use the exact sudo paths authorized in /etc/sudoers.d/github-runner
          sudo /usr/bin/cp -v "$FILE_PATH" /var/ossec/etc/rules/local_rules.xml
          sudo /usr/bin/systemctl restart wazuh-manager
          
          echo "Deployment successful: Wazuh Manager updated and restarted."